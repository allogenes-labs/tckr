name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check tckr tests

      - name: Smoke tests (keyless modules only — keyed tests gated by needs_keys marker)
        run: pytest -m "not needs_keys" -v
        env:
          # Force-clear any keys so tests exercise the keyless paths only.
          # Keyed-module tests are skipped by marker rather than env.
          PYTHONUNBUFFERED: "1"
